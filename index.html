<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Muzyczne Radio - MSI Dragon Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* Główne ustawienia */
        body {
            margin: 0;
            background: black;
            color: white;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
        }

        /* Nagłówek */
        #title {
            font-size: 60px;
            color: #ff2a2a;
            margin-top: 20px;
            text-shadow: 0 0 12px red;
        }

        /* Ramka RDS - Poprawiona pod animację */
        #trackBox {
            margin: 20px auto;
            width: 520px;
            height: 40px;
            background: #111;
            border: 2px solid #ff2222;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px red inset;
            overflow: hidden;
            position: relative; /* Ważne dla rds.js */
        }

        #trackDisplay {
            font-size: 18px;
            color: #ff4444;
            white-space: nowrap;
            display: block;
            text-transform: uppercase;
        }

        /* Przyciski sterowania */
        .controls {
            margin-top: 30px;
        }

        button {
            padding: 12px 25px;
            background: #111;
            border: 1px solid #444;
            color: #888;
            font-family: 'Orbitron';
            cursor: pointer;
            margin: 10px;
            transition: 0.3s;
            border-radius: 4px;
        }

        button:hover {
            border-color: #ff2a2a;
            color: #ff2a2a;
        }

        button.active {
            background: #220000;
            border-color: red;
            color: white;
            box-shadow: 0 0 15px red;
        }

        /* Dodatki */
        #clock {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #555;
            font-size: 20px;
        }

        #signature {
            position: absolute;
            bottom: 20px;
            width: 100%;
            font-size: 12px;
            color: #222;
            letter-spacing: 2px;
        }

        /* Definicja animacji przewijania */
        @keyframes scrollText {
            0% { transform: translateX(0); }
            100% { transform: translateX(-150%); }
        }
    </style>
</head>
<body>

    <div id="clock">00:00:00</div>
    <div id="title">Muzyczne Radio</div>

    <div id="trackBox">
        <div id="trackDisplay">INICJALIZACJA...</div>
    </div>

    <div class="controls">
        <button id="playBtn" onclick="toggleRadio()">PLAY / STOP</button>
    </div>

    <audio id="audio" crossorigin="anonymous"></audio>

    <div id="signature">SYSTEM DESIGN BY ŁUKASZ.B // V11.0</div>

    <script>
        const audio = document.getElementById("audio");
        const playBtn = document.getElementById("playBtn");
        let isPlaying = false;

        function toggleRadio() {
            if (!isPlaying) {
                // Oficjalny stream Muzycznego Radia
                audio.src = "https://stream.rcs.revma.com/gzwc1xcq042vv";
                audio.play().catch(e => console.log("Kliknij jeszcze raz, aby odtworzyć"));
                playBtn.classList.add("active");
                isPlaying = true;
            } else {
                audio.pause();
                audio.src = "";
                playBtn.classList.remove("active");
                isPlaying = false;
            }
        }

        // Prosty zegar w rogu
        setInterval(() => {
            document.getElementById("clock").innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>

    <script src="rds.js"></script>

</body>
</html>
